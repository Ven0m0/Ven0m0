name: Update Profile Activity
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: profile-activity
  cancel-in-progress: true

jobs:
  update-profile-activity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Update latest repos section
        env:
          PYTHONOPTIMIZE: "1"
          GITHUB_ACTOR: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run --python 3.14 scripts/update_profile_activity.py

      - name: Commit and push changes
        uses: ./.github/actions/git-auto-commit
        with:
          commit_message: "chore: refresh profile repo activity"
          file_pattern: "README.md"
